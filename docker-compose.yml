services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/app/data/db.sqlite
      - PYTHON_PATH=python3
      - CORS_ORIGIN=http://localhost:3000
      - PORT=8080
    volumes:
      - ./data:/app/data
      - ./worker:/app/worker
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  worker:
    build: ./worker
    environment:
      - DISPLAY=:99
    volumes:
      - ./data:/app/data
      - ./worker:/app/worker
    restart: unless-stopped

volumes:
  redis_data:
